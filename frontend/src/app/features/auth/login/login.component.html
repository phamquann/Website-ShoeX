<div class="login-container">
  <div class="glass-panel">
    <div class="brand">
      <div class="logo"></div>
      <h2>ShoeX Admin</h2>
      <p>Hệ thống Quản Trị Cửa Hàng</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Tài Khoản</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="username" 
            formControlName="username" 
            placeholder="Nhập tên đăng nhập..."
            autocomplete="off"
            [class.invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mật Khẩu</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="Nhập mật khẩu..."
            [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>
      </div>

      <div class="error-box" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Đăng Nhập Ngay</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>
    
    <div class="footer-links">
      <a routerLink="/register">Chưa có tài khoản? Đăng ký ngay</a>
      <a href="javascript:void(0)" style="margin-left: 16px;">Quên mật khẩu?</a>
    </div>
  </div>

  <div class="bg-circles">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
</div>
