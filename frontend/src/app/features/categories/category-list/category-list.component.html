<div class="page-container">
  <div class="page-header">
    <div class="header-left">
      <h2>Categories Management</h2>
      <p>Manage product categories</p>
    </div>
    <div class="header-right">
      <div class="search-box">
        <i class="icon-search">🔍</i>
        <input type="text" placeholder="Search categories..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
        <button class="btn btn-search" (click)="onSearch()">Search</button>
      </div>
      <button class="btn btn-primary" (click)="openAddModal()">
        <i class="icon-plus">➕</i> Add New Category
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Slug</th>
          <th>Description</th>
          <th width="120" class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of categories">
          <td><strong>{{ item.name }}</strong></td>
          <td><span class="badge">{{ item.slug }}</span></td>
          <td><span class="text-truncate">{{ item.description }}</span></td>
          <td class="text-right">
            <div class="action-buttons">
              <button class="btn-icon text-primary" (click)="openEditModal(item)">✏️</button>
              <button class="btn-icon text-error" (click)="deleteCategory(item._id)">🗑️</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="categories.length === 0">
          <td colspan="4" class="text-center py-4">No categories found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination-container" *ngIf="meta && meta.totalPages > 1">
    <span class="page-info">Page {{meta.page}} of {{meta.totalPages}} (Total: {{meta.total}})</span>
    <div class="pagination">
      <button class="btn-page" [disabled]="meta.page === 1" (click)="changePage(meta.page - 1)">Previous</button>
      <button class="btn-page active">{{ meta.page }}</button>
      <button class="btn-page" [disabled]="meta.page === meta.totalPages" (click)="changePage(meta.page + 1)">Next</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editingCategory ? 'Edit Category' : 'Add New Category' }}</h3>
      <button class="btn-close" (click)="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Category Name <span class="text-error">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="categoryForm.name" placeholder="Enter category name">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" [(ngModel)]="categoryForm.description" rows="3" placeholder="Enter description"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="saveCategory()">{{ editingCategory ? 'Update' : 'Create' }}</button>
    </div>
  </div>
</div>
