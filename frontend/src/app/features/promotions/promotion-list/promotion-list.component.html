<div class="page-container">
  <div class="page-header">
    <div class="header-left"> <h2>Promotions</h2><p>Manage system promotions</p> </div>
    <div class="header-right"> <button class="btn btn-primary" (click)="openAddModal()">➕ Add Promotion</button> </div>
  </div>
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr><th>Name</th><th>Type</th><th>Discount</th><th>Date</th><th>Status</th><th class="text-right">Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of promotions">
          <td><strong>{{ item.name }}</strong></td>
          <td>{{ item.type }}</td>
          <td>{{ item.discountValue }}<span *ngIf="item.discountType==='percentage'">%</span><span *ngIf="item.discountType!=='percentage'">đ</span></td>
          <td>{{ item.startDate | date:'M/d/yy' }} - {{ item.endDate | date:'M/d/yy' }}</td>
          <td><span class="badge" [ngClass]="item.isActive?'badge-success':'badge-error'">{{item.isActive?'Active':'Inactive'}}</span></td>
          <td class="text-right">
            <button class="btn-icon text-primary" (click)="openEditModal(item)">✏️</button>
            <button class="btn-icon text-error" (click)="deleteItem(item._id)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header"><h3>{{ editingPromotion ? 'Edit' : 'Add' }} Promotion</h3><button class="btn-close" (click)="closeModal()">✕</button></div>
    <div class="modal-body" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group" style="grid-column:1/-1"><label>Name *</label><input type="text" class="form-control" [(ngModel)]="form.name"></div>
      <div class="form-group"><label>Type</label><select class="form-control" [(ngModel)]="form.type"><option value="product">Product</option><option value="category">Category</option><option value="brand">Brand</option><option value="flash_sale">Flash Sale</option></select></div>
      <div class="form-group"><label>Discount By</label><select class="form-control" [(ngModel)]="form.discountType"><option value="percentage">%</option><option value="fixed">VND</option></select></div>
      <div class="form-group"><label>Value</label><input type="number" class="form-control" [(ngModel)]="form.discountValue"></div>
      <div class="form-group"><label>Status</label><select class="form-control" [(ngModel)]="form.isActive"><option [ngValue]="true">Active</option><option [ngValue]="false">Inactive</option></select></div>
      <div class="form-group"><label>Start Date *</label><input type="date" class="form-control" [(ngModel)]="form.startDate"></div>
      <div class="form-group"><label>End Date *</label><input type="date" class="form-control" [(ngModel)]="form.endDate"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" (click)="closeModal()">Cancel</button><button class="btn btn-primary" (click)="save()">Save</button></div>
  </div>
</div>
