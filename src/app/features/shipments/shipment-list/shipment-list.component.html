<div class="page-container">
  <div class="page-header">
    <div class="header-left"> <h2>Shipments Management</h2><p>Track order shipments</p> </div>
  </div>
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr><th>Order ID</th><th>Provider</th><th>Tracking No.</th><th>Status</th><th class="text-right">Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of shipments">
          <td><strong>{{ item.order?.orderCode || item.order }}</strong></td>
          <td>{{ item.shippingProvider }}</td>
          <td><span class="badge">{{ item.trackingNumber }}</span></td>
          <td>{{ item.status }}</td>
          <td class="text-right">
            <button class="btn-icon text-primary" (click)="openEdit(item)">✏️ Update</button>
          </td>
        </tr>
        <tr *ngIf="shipments.length === 0"><td colspan="5" class="text-center py-4">No shipments found.</td></tr>
      </tbody>
    </table>
  </div>
</div>
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header"><h3>Update Shipment</h3><button class="btn-close" (click)="closeModal()">✕</button></div>
    <div class="modal-body" style="display:grid; gap:16px;">
      <div class="form-group"><label>Provider</label><input type="text" class="form-control" [(ngModel)]="form.shippingProvider"></div>
      <div class="form-group"><label>Tracking Number</label><input type="text" class="form-control" [(ngModel)]="form.trackingNumber"></div>
      <div class="form-group"><label>Status</label>
        <select class="form-control" [(ngModel)]="form.status">
          <option value="preparing">Preparing</option>
          <option value="picked_up">Picked Up</option>
          <option value="delivering">Delivering</option>
          <option value="delivered">Delivered</option>
          <option value="failed">Failed</option>
        </select>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" (click)="closeModal()">Cancel</button><button class="btn btn-primary" (click)="save()">Save</button></div>
  </div>
</div>
