<div class="page-container">
  <div class="page-header">
    <div class="header-left">
      <h2>Banners Management</h2>
      <p>Manage homepage banners and sliders</p>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" (click)="openAddModal()">
        <i class="icon-plus">➕</i> Add New Banner
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th width="150">Image</th>
          <th>Title</th>
          <th>Link Target</th>
          <th>Order</th>
          <th>Status</th>
          <th width="120" class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of banners">
          <td>
            <div style="width:100px; height:50px; background-size:cover; background-position:center; border-radius:6px; background-color:#eee;" [style.backgroundImage]="'url(' + item.imageUrl + ')'"></div>
          </td>
          <td><strong>{{ item.title }}</strong></td>
          <td>{{ item.link || 'None' }}</td>
          <td>{{ item.sortOrder }}</td>
          <td>
            <span class="badge" [ngClass]="item.isActive ? 'badge-success' : 'badge-error'">
              {{ item.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="text-right">
            <div class="action-buttons">
              <button class="btn-icon text-primary" (click)="openEditModal(item)">✏️</button>
              <button class="btn-icon text-error" (click)="deleteBanner(item._id)">🗑️</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="banners.length === 0">
          <td colspan="6" class="text-center py-4">No banners found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editingBanner ? 'Edit Banner' : 'Add New Banner' }}</h3>
      <button class="btn-close" (click)="closeModal()">✕</button>
    </div>
    <div class="modal-body" style="display: grid; grid-template-columns: 1fr; gap: 16px;">
      <div class="form-group">
        <label>Title <span class="text-error">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="bannerForm.title" placeholder="Summer Sale">
      </div>
      <div class="form-group">
        <label>Image URL <span class="text-error">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="bannerForm.imageUrl" placeholder="https://example.com/image.jpg">
      </div>
      <div class="form-group">
        <label>Link (URL to redirect on click)</label>
        <input type="text" class="form-control" [(ngModel)]="bannerForm.link" placeholder="/products-catalog?category=xyz">
      </div>
      <div class="form-group">
        <label>Sort Order</label>
        <input type="number" class="form-control" [(ngModel)]="bannerForm.sortOrder">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-control" [(ngModel)]="bannerForm.isActive">
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="saveBanner()">{{ editingBanner ? 'Update' : 'Create' }}</button>
    </div>
  </div>
</div>
