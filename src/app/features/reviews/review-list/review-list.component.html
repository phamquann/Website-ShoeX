<div class="page-container">
  <div class="page-header">
    <div class="header-left"> <h2>Đánh giá của tôi</h2><p>Quản lý các sản phẩm bạn đã đánh giá</p> </div>
  </div>
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr><th>Sản Phẩm</th><th>Đánh giá</th><th>Nội dung</th><th>Thời gian</th><th class="text-right">Hành động</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of reviews">
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <img *ngIf="item.product?.thumbnail" [src]="item.product.thumbnail" style="width:40px; height:40px; border-radius:4px;">
              <strong>{{ item.product?.name || 'Sản phẩm đã xóa' }}</strong>
            </div>
          </td>
          <td><span style="color:#fbbf24;">{{ '⭐'.repeat(item.rating) }}</span> ({{ item.rating }})</td>
          <td>{{ item.comment }}</td>
          <td>{{ item.createdAt | date:'short' }}</td>
          <td class="text-right">
            <button class="btn-icon text-primary" (click)="openEdit(item)">✏️</button>
            <button class="btn-icon text-error" (click)="deleteItem(item._id)">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="reviews.length === 0"><td colspan="5" class="text-center py-4">Bạn chưa đánh giá sản phẩm nào.</td></tr>
      </tbody>
    </table>
  </div>
</div>
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header"><h3>Sửa đánh giá</h3><button class="btn-close" (click)="closeModal()">✕</button></div>
    <div class="modal-body" style="display:grid; gap:16px;">
      <div class="form-group"><label>Số sao</label><input type="number" class="form-control" [(ngModel)]="form.rating" min="1" max="5"></div>
      <div class="form-group"><label>Nội dung</label><textarea class="form-control" [(ngModel)]="form.comment" rows="3"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" (click)="closeModal()">Hủy</button><button class="btn btn-primary" (click)="save()">Lưu</button></div>
  </div>
</div>
